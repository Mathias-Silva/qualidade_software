name: CI

on:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build with Maven
        # Adicionada a propriedade que estava causando o erro
        run: ./mvnw package -DskipTests -Dmaven.multiModuleProjectDirectory=$GITHUB_WORKSPACE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Run Tests
        # Adicionada a propriedade aqui também para evitar o erro no step de teste
        run: ./mvnw test -Dmaven.multiModuleProjectDirectory=$GITHUB_WORKSPACE
        env:
          # Exemplo caso seu teste precise de uma URI do Mongo específica
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/testdb
